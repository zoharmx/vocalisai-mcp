name: Deploy Dashboard to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - "src/vocalisai_mcp/dashboard/**"
      - "Dockerfile"
      - "entrypoint.sh"
      - "requirements.txt"
  workflow_dispatch:        # allow manual trigger from GitHub UI

env:
  GCP_PROJECT:  tikunframework
  GCP_REGION:   us-central1
  IMAGE:        us-central1-docker.pkg.dev/tikunframework/vocalisai/vocalisai-dashboard
  SERVICE_NAME: vocalisai-dashboard

jobs:
  deploy:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write         # for Workload Identity Federation (recommended)

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Alternatively, use Workload Identity Federation:
          # workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          # service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "$IMAGE:${{ github.sha }}" \
            --tag "$IMAGE:latest" \
            --label "git-commit=${{ github.sha }}" \
            .

      - name: Push to Artifact Registry
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE:${{ github.sha }}" \
            --platform managed \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --set-env-vars "SERVICE=dashboard,VOCALISAI_BASE_URL=${{ secrets.VOCALISAI_BASE_URL }}" \
            --set-secrets "VOCALISAI_API_KEY=vocalisai-api-key:latest" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 80 \
            --timeout 60 \
            --quiet

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region "$GCP_REGION" \
            --format "value(status.url)")
          echo "✅ Dashboard deployed: $URL"
          echo "DASHBOARD_URL=$URL" >> $GITHUB_ENV
