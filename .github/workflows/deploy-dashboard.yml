name: Deploy Dashboard to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - "src/vocalisai_mcp/dashboard/**"
      - "Dockerfile"
      - "entrypoint.sh"
      - "requirements.txt"
  workflow_dispatch:        # allow manual trigger from GitHub UI

# ── All project-specific values come from GitHub repository secrets/variables.
# Configure them in: Settings → Secrets and variables → Actions
#
# Required Secrets:   GCP_SA_KEY, VOCALISAI_BASE_URL
# Required Variables: GCP_PROJECT, GCP_REGION, GCP_AR_REPO (Artifact Registry repo name)
# Optional Secrets:   VOCALISAI_API_KEY (if backend uses API key auth)

jobs:
  deploy:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate ────────────────────────────────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Build image tag from project variables (no hardcoded values) ────────
      - name: Compute image tag
        id: vars
        run: |
          PROJECT="${{ vars.GCP_PROJECT }}"
          REGION="${{ vars.GCP_REGION }}"
          REPO="${{ vars.GCP_AR_REPO }}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/vocalisai-dashboard"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Build & push ────────────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.vars.outputs.image_sha }}" \
            --tag "${{ steps.vars.outputs.image_latest }}" \
            --label "git-commit=${{ github.sha }}" \
            --label "service=dashboard" \
            .

      - name: Push to Artifact Registry
        run: |
          docker push "${{ steps.vars.outputs.image_sha }}"
          docker push "${{ steps.vars.outputs.image_latest }}"

      # ── Deploy ──────────────────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          ENV_VARS="SERVICE=dashboard,VOCALISAI_BASE_URL=${{ secrets.VOCALISAI_BASE_URL }}"

          # Only set VOCALISAI_API_KEY if the secret exists
          SECRET_FLAGS=""
          if [[ -n "${{ secrets.VOCALISAI_API_KEY }}" ]]; then
            SECRET_FLAGS="--set-secrets VOCALISAI_API_KEY=vocalisai-api-key:latest"
          fi

          gcloud run deploy vocalisai-dashboard \
            --image "${{ steps.vars.outputs.image_sha }}" \
            --platform managed \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --set-env-vars "$ENV_VARS" \
            $SECRET_FLAGS \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 80 \
            --timeout 60 \
            --quiet

      - name: Print deployed URL
        run: |
          URL=$(gcloud run services describe vocalisai-dashboard \
            --region "${{ vars.GCP_REGION }}" \
            --format "value(status.url)")
          echo "✅ Dashboard deployed at: $URL"
